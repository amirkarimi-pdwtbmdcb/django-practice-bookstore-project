<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block page_title %}
        
        {% endblock page_title %}
    </title>
</head>
<body>
    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">خروج</button>
    </form>
{% else %}
    <a href="{% url 'login' %}">ورود</a> | <a href="{% url 'signup' %}">ثبت نام</a>
{% endif %}

    {% block content %}
    
    {% endblock content %}
    
</body>
</html>
